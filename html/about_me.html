<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolillofolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <a id="exit" href="./menu.html">
        <img class="exit_button" src="../media/main/close.png">
    </a>

    <img class="about_me_images" id="main_background" src="../media/about_me/7.png">

    <img class="about_me_images" id="hearth" src="../media/about_me/hearth_off.png">
    <img class="about_me_images" id="hand" src="../media/about_me/hand_off.png">
    <img class="about_me_images" id="dog" src="../media/about_me/dog_head_off.png">
    <img class="about_me_images" id="paws" src="../media/about_me/paws_off.png">
    <img class="about_me_images" id="flowers" src="../media/about_me/flower_off.png">
    <img class="about_me_images" id="pieces" src="../media/about_me/pieces_off.png">
    <img class="about_me_images" id="star" src="../media/about_me/star_off.png">
    <img class="about_me_images" id="bulb" src="../media/about_me/bulb_off.png">
    
    <div class="right" style="display: block;">
        <div class="column">
        <div class="modal_wrapper" id="right_modal">
            <div class="column">
                <div class="modal">
                    <p class=" modal_content chewy"></p>
                </div>
            </div>
        </div>
        <div style="height: 2em;"></div>
        <img class="bunny" id="right_bunny" src="../media/about_me/bmc.png">
        </div>
    </div>

    <div class="left" style="display: block;">
        <div class="column">
        <div class="modal_wrapper" id="left_modal">
            <div class="column">
                <div class="modal">
                    <p class=" modal_content chewy"></p>
                </div>
            </div>
        </div>
        <div style="height: 2em;"></div>
        <img class="bunny" id="left_bunny" src="../media/about_me/bmc.png">
        </div>
    </div>

</body>
<script src="../js/about_me_behavior.js"></script>
</html>
